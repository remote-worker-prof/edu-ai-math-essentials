<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Plain seq2seq training with teacher forcing</title>
  <desc id="desc">Encoder reads source tokens, decoder receives shifted true target tokens as decoder_input and predicts decoder_target. The diagram intentionally contains no attention block.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <style>
      .title { font: 700 30px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .label { font: 600 19px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .small { font: 500 16px 'DejaVu Sans', sans-serif; fill: #1f2937; }
      .tiny { font: 500 14px 'DejaVu Sans', sans-serif; fill: #334155; }
      .source { fill: #dcfce7; stroke: #166534; stroke-width: 2; rx: 10; }
      .target { fill: #fef3c7; stroke: #92400e; stroke-width: 2; rx: 10; }
      .state { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 10; }
      .decoder { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 10; }
      .output { fill: #fce7f3; stroke: #be185d; stroke-width: 2; rx: 10; }
      .note { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 10; }
      .line { stroke: #0f172a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #475569; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="40" y="52" class="title">Plain seq2seq: обучение с teacher forcing</text>
  <text x="40" y="84" class="small">01-RNN: decoder не смотрит attention-таблицу, а стартует из состояния encoder.</text>

  <rect x="50" y="140" width="120" height="56" class="source"/>
  <text x="82" y="174" class="label">x_1</text>
  <rect x="210" y="140" width="120" height="56" class="source"/>
  <text x="242" y="174" class="label">x_2</text>
  <rect x="370" y="140" width="120" height="56" class="source"/>
  <text x="402" y="174" class="label">x_3</text>

  <rect x="50" y="260" width="120" height="64" class="state"/>
  <text x="80" y="298" class="label">enc_1</text>
  <rect x="210" y="260" width="120" height="64" class="state"/>
  <text x="240" y="298" class="label">enc_2</text>
  <rect x="370" y="260" width="120" height="64" class="state"/>
  <text x="400" y="298" class="label">enc_3</text>

  <path d="M 110 196 L 110 260" class="line"/>
  <path d="M 270 196 L 270 260" class="line"/>
  <path d="M 430 196 L 430 260" class="line"/>
  <path d="M 170 292 L 210 292" class="line"/>
  <path d="M 330 292 L 370 292" class="line"/>

  <rect x="570" y="210" width="170" height="84" class="state"/>
  <text x="610" y="246" class="label">context</text>
  <text x="590" y="272" class="small">h_T encoder</text>
  <path d="M 490 292 L 570 252" class="line"/>

  <rect x="820" y="120" width="120" height="56" class="target"/>
  <text x="850" y="154" class="label">SOS</text>
  <rect x="980" y="120" width="120" height="56" class="target"/>
  <text x="1018" y="154" class="label">y_1</text>
  <rect x="1140" y="120" width="120" height="56" class="target"/>
  <text x="1178" y="154" class="label">y_2</text>

  <rect x="820" y="250" width="120" height="64" class="decoder"/>
  <text x="850" y="288" class="label">dec_1</text>
  <rect x="980" y="250" width="120" height="64" class="decoder"/>
  <text x="1010" y="288" class="label">dec_2</text>
  <rect x="1140" y="250" width="120" height="64" class="decoder"/>
  <text x="1170" y="288" class="label">dec_3</text>

  <path d="M 880 176 L 880 250" class="line"/>
  <path d="M 1040 176 L 1040 250" class="line"/>
  <path d="M 1200 176 L 1200 250" class="line"/>
  <path d="M 740 252 L 820 282" class="line"/>
  <path d="M 940 282 L 980 282" class="line"/>
  <path d="M 1100 282 L 1140 282" class="line"/>

  <rect x="820" y="390" width="120" height="56" class="output"/>
  <text x="850" y="424" class="label">y_1</text>
  <rect x="980" y="390" width="120" height="56" class="output"/>
  <text x="1018" y="424" class="label">y_2</text>
  <rect x="1140" y="390" width="120" height="56" class="output"/>
  <text x="1178" y="424" class="label">EOS</text>
  <path d="M 880 314 L 880 390" class="line"/>
  <path d="M 1040 314 L 1040 390" class="line"/>
  <path d="M 1200 314 L 1200 390" class="line"/>

  <rect x="60" y="500" width="1180" height="94" class="note"/>
  <text x="85" y="532" class="label">Data-contract</text>
  <text x="85" y="562" class="small">decoder_input = [SOS] + target[:-1]; decoder_target = target</text>
  <text x="85" y="586" class="tiny">Training uses true previous target tokens. Predictions are compared with decoder_target; they are not fed back during teacher forcing.</text>
  <text x="790" y="532" class="small">Нет attention_scores и heatmap в 01-RNN.</text>
</svg>
