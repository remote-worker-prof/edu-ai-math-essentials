<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <style>
      .title { font: 700 30px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .label { font: 500 20px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .small { font: 500 17px 'DejaVu Sans', sans-serif; fill: #1f2937; }
      .box { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 12; }
      .state { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 12; }
      .input { fill: #dcfce7; stroke: #166534; stroke-width: 2; rx: 12; }
      .output { fill: #fef3c7; stroke: #92400e; stroke-width: 2; rx: 12; }
      .line { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="40" y="52" class="title">SimpleRNN: прямой проход (единая нотация)</text>

  <rect x="60" y="180" width="140" height="64" class="input"/>
  <text x="96" y="220" class="label">x_t</text>

  <rect x="60" y="320" width="140" height="64" class="state"/>
  <text x="80" y="360" class="label">h_(t-1)</text>

  <rect x="300" y="220" width="210" height="130" class="box"/>
  <text x="330" y="265" class="label">a_t = W_xh x_t</text>
  <text x="330" y="295" class="label">    + W_hh h_(t-1)</text>
  <text x="330" y="325" class="label">    + b_h</text>

  <rect x="580" y="250" width="130" height="70" class="box"/>
  <text x="606" y="293" class="label">tanh</text>

  <rect x="780" y="250" width="130" height="70" class="state"/>
  <text x="810" y="293" class="label">h_t</text>

  <rect x="980" y="220" width="160" height="70" class="output"/>
  <text x="1010" y="263" class="label">s_t</text>

  <rect x="980" y="330" width="160" height="70" class="output"/>
  <text x="1005" y="373" class="label">y_hat_t</text>

  <path d="M 200 212 L 300 255" class="line"/>
  <text x="220" y="205" class="small">W_xh</text>

  <path d="M 200 352 L 300 315" class="line"/>
  <text x="218" y="345" class="small">W_hh</text>

  <path d="M 510 285 L 580 285" class="line"/>
  <path d="M 710 285 L 780 285" class="line"/>
  <path d="M 910 285 L 980 255" class="line"/>
  <text x="922" y="250" class="small">W_hy</text>

  <path d="M 1040 290 L 1040 330" class="line"/>
  <text x="1052" y="316" class="small">g(·)</text>

  <text x="40" y="470" class="label">Формулы:</text>
  <text x="40" y="500" class="small">h_t = tanh(W_xh x_t + W_hh h_(t-1) + b_h)</text>
  <text x="40" y="528" class="small">s_t = W_hy h_t + b_y,    y_hat_t = g(s_t)</text>
</svg>
