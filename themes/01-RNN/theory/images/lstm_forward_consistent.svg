<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="620" viewBox="0 0 1300 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <style>
      .title { font: 700 30px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .label { font: 500 20px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .small { font: 500 17px 'DejaVu Sans', sans-serif; fill: #1f2937; }
      .box { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 12; }
      .gate { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 12; }
      .state { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 12; }
      .input { fill: #dcfce7; stroke: #166534; stroke-width: 2; rx: 12; }
      .line { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="40" y="50" class="title">LSTM: прямой проход (единая нотация)</text>

  <rect x="50" y="110" width="180" height="64" class="input"/>
  <text x="78" y="150" class="label">x_t, h_(t-1)</text>
  <text x="50" y="195" class="small">u_t = [h_(t-1); x_t]</text>

  <rect x="280" y="90" width="190" height="72" class="gate"/>
  <text x="304" y="132" class="label">f_t = sigma(...)</text>

  <rect x="280" y="190" width="190" height="72" class="gate"/>
  <text x="304" y="232" class="label">i_t = sigma(...)</text>

  <rect x="280" y="290" width="190" height="72" class="box"/>
  <text x="306" y="332" class="label">c_t_tilde = tanh(...)</text>

  <rect x="280" y="390" width="190" height="72" class="gate"/>
  <text x="304" y="432" class="label">o_t = sigma(...)</text>

  <rect x="530" y="130" width="190" height="64" class="state"/>
  <text x="560" y="170" class="label">f_t * c_(t-1)</text>

  <rect x="530" y="250" width="190" height="64" class="state"/>
  <text x="560" y="290" class="label">i_t * c_t_tilde</text>

  <rect x="790" y="190" width="170" height="84" class="state"/>
  <text x="838" y="240" class="label">c_t</text>

  <rect x="1030" y="190" width="210" height="84" class="state"/>
  <text x="1058" y="225" class="label">h_t = o_t *</text>
  <text x="1078" y="252" class="label">tanh(c_t)</text>

  <path d="M 230 140 L 280 126" class="line"/>
  <path d="M 230 140 L 280 226" class="line"/>
  <path d="M 230 140 L 280 326" class="line"/>
  <path d="M 230 140 L 280 426" class="line"/>

  <path d="M 470 126 L 530 162" class="line"/>
  <path d="M 470 226 L 530 282" class="line"/>
  <path d="M 470 326 L 530 282" class="line"/>

  <path d="M 720 162 L 790 220" class="line"/>
  <path d="M 720 282 L 790 244" class="line"/>

  <path d="M 470 426 L 1030 220" class="line"/>
  <path d="M 960 232 L 1030 232" class="line"/>

  <text x="40" y="520" class="label">Формулы:</text>
  <text x="40" y="548" class="small">f_t = sigma(W_f u_t + b_f), i_t = sigma(W_i u_t + b_i), o_t = sigma(W_o u_t + b_o)</text>
  <text x="40" y="574" class="small">c_t_tilde = tanh(W_c u_t + b_c),  c_t = f_t * c_(t-1) + i_t * c_t_tilde,  h_t = o_t * tanh(c_t)</text>
</svg>
