<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <style>
      .title { font: 700 30px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .label { font: 500 20px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .small { font: 500 16px 'DejaVu Sans', sans-serif; fill: #1f2937; }
      .q { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 12; }
      .a { fill: #ecfdf5; stroke: #166534; stroke-width: 2; rx: 12; }
      .line { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="40" y="50" class="title">Карта выбора RNN-архитектуры (стартовая гипотеза)</text>

  <rect x="460" y="90" width="360" height="82" class="q"/>
  <text x="505" y="140" class="label">Нужен длинный контекст?</text>

  <rect x="200" y="250" width="320" height="82" class="q"/>
  <text x="238" y="300" class="label">Критична минимальная сложность?</text>

  <rect x="740" y="250" width="320" height="82" class="q"/>
  <text x="780" y="300" class="label">Критична низкая latency?</text>

  <rect x="90" y="420" width="250" height="90" class="a"/>
  <text x="145" y="472" class="label">SimpleRNN</text>

  <rect x="420" y="420" width="250" height="90" class="a"/>
  <text x="510" y="472" class="label">GRU</text>

  <rect x="780" y="420" width="250" height="90" class="a"/>
  <text x="875" y="472" class="label">LSTM</text>

  <rect x="1070" y="420" width="170" height="90" class="a"/>
  <text x="1120" y="472" class="label">GRU</text>

  <path d="M 540 172 L 320 250" class="line"/>
  <text x="428" y="220" class="small">Нет</text>

  <path d="M 740 172 L 900 250" class="line"/>
  <text x="828" y="220" class="small">Да</text>

  <path d="M 240 332 L 210 420" class="line"/>
  <text x="210" y="384" class="small">Да</text>

  <path d="M 420 332 L 540 420" class="line"/>
  <text x="462" y="384" class="small">Нет</text>

  <path d="M 840 332 L 905 420" class="line"/>
  <text x="862" y="384" class="small">Нет</text>

  <path d="M 1000 332 L 1155 420" class="line"/>
  <text x="1062" y="384" class="small">Да</text>

  <text x="40" y="570" class="small">Примечание: карта задает стартовый выбор. Финальное решение подтверждается метриками на validation/test.</text>
</svg>
