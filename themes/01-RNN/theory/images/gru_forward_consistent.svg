<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="620" viewBox="0 0 1300 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <style>
      .title { font: 700 30px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .label { font: 500 20px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .small { font: 500 17px 'DejaVu Sans', sans-serif; fill: #1f2937; }
      .box { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 12; }
      .gate { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 12; }
      .state { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 12; }
      .input { fill: #dcfce7; stroke: #166534; stroke-width: 2; rx: 12; }
      .line { stroke: #0f172a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="40" y="50" class="title">GRU: прямой проход (единая нотация)</text>

  <rect x="50" y="110" width="200" height="64" class="input"/>
  <text x="82" y="150" class="label">x_t, h_(t-1)</text>
  <text x="50" y="195" class="small">u_t = [h_(t-1); x_t]</text>

  <rect x="300" y="100" width="190" height="72" class="gate"/>
  <text x="326" y="142" class="label">z_t = sigma(...)</text>

  <rect x="300" y="220" width="190" height="72" class="gate"/>
  <text x="326" y="262" class="label">r_t = sigma(...)</text>

  <rect x="300" y="340" width="300" height="72" class="box"/>
  <text x="324" y="382" class="label">h_t_tilde = tanh(W_h [r_t*h_(t-1); x_t] + b_h)</text>

  <rect x="680" y="170" width="230" height="72" class="state"/>
  <text x="706" y="212" class="label">(1-z_t) * h_(t-1)</text>

  <rect x="680" y="290" width="230" height="72" class="state"/>
  <text x="718" y="332" class="label">z_t * h_t_tilde</text>

  <rect x="980" y="220" width="180" height="82" class="state"/>
  <text x="1040" y="268" class="label">h_t</text>

  <rect x="980" y="360" width="180" height="72" class="box"/>
  <text x="1035" y="404" class="label">s_t -> y_hat_t</text>

  <path d="M 250 140 L 300 136" class="line"/>
  <path d="M 250 140 L 300 256" class="line"/>
  <path d="M 250 140 L 300 376" class="line"/>

  <path d="M 490 136 L 680 206" class="line"/>
  <path d="M 490 136 L 680 326" class="line"/>
  <path d="M 490 256 L 600 376" class="line"/>

  <path d="M 600 376 L 680 326" class="line"/>

  <path d="M 910 206 L 980 248" class="line"/>
  <path d="M 910 326 L 980 272" class="line"/>

  <path d="M 1070 302 L 1070 360" class="line"/>

  <text x="40" y="510" class="label">Формулы:</text>
  <text x="40" y="538" class="small">z_t = sigma(W_z u_t + b_z),   r_t = sigma(W_r u_t + b_r)</text>
  <text x="40" y="564" class="small">h_t_tilde = tanh(W_h [r_t * h_(t-1); x_t] + b_h)</text>
  <text x="40" y="590" class="small">h_t = (1-z_t) * h_(t-1) + z_t * h_t_tilde,   s_t = W_hy h_t + b_y</text>
</svg>
